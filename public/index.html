<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT MAIL ARCHIVES</title>
  
  <!-- 💡 追加：Inter と BIZ UDPGothic / Mincho のWebフォントを読み込む -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=BIZ+UDPMincho&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { initializeAppCheck, ReCaptchaV3Provider } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app-check.js';

    // 💡 共通化された最新のインライン設定
    const config = {
        firebaseConfig: {
            apiKey: "AIzaSyAvGBhHtPdR0qETpNh3eyYiVpAC0gYb2YU",
            authDomain: "uds-portal-tools.firebaseapp.com",
            projectId: "uds-portal-tools",
            storageBucket: "uds-portal-tools.firebasestorage.app",
            messagingSenderId: "1058352022068",
            appId: "1:1058352022068:web:70dcd97f1555d6a9d04061"
        },
        RECAPTCHA_SITE_KEY: "6LdP-pYsAAAAAHEsYWrlb9vGGdyP4HQXI8H2_Ug8",
        APP_ID: "minimal-log"
    };

    try {
      const app = initializeApp(config.firebaseConfig);
      
      // App Checkの初期化（不正アクセス防止）
      try { initializeAppCheck(app, { provider: new ReCaptchaV3Provider(config.RECAPTCHA_SITE_KEY), isTokenAutoRefreshEnabled: true }); } catch (e) {}

      window.db = getFirestore(app);
      window.auth = getAuth(app);
      
      // Iframe環境でのログイン状態維持を強化
      setPersistence(window.auth, browserLocalPersistence).catch(console.error);

      window.GoogleAuthProvider = GoogleAuthProvider;
      window.signInWithPopup = signInWithPopup;
      window.signOut = signOut;
      window.onAuthStateChanged = onAuthStateChanged;
      window.collection = collection;
      window.getDocs = getDocs;
      window.APP_ID = config.APP_ID; // データ取得のパスに使用
      
      window.firebaseInitialized = true;
      window.dispatchEvent(new Event('firebase-ready'));
    } catch (e) {
      console.error("Firebase SDK Loading Error:", e);
    }
  </script>

  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 音声プレイヤーのデフォルトデザインを少し調整 */
    audio {
        border-radius: 999px;
        height: 48px;
        outline: none;
    }
  </style>
</head>
<body class="bg-[#222831] text-[#EEEEEE]">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const Search = ({ size=24, className="" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>);
    const ArrowLeft = ({ size=24, className="" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>);
    const Type = ({ size=24, className="" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg>);
    const Sun = ({ size=24, className="" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>);
    const Moon = ({ size=24, className="" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>);
    const X = ({ size=24, className="" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>);
    const Filter = ({ size=24, className="" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>);
    const Clock = ({ size=24, className="" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>);
    const Info = ({ size=24, className="" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>);
    const LogOut = ({ size=24, className="" }) => (<svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>);

    const SITE_TITLE = "IT担当者の雑記アーカイブ";

    function App() {
      const [view, setView] = useState('index'); 
      const [selectedPost, setSelectedPost] = useState(null);
      const [theme, setTheme] = useState('dark');
      const [fontFamily, setFontFamily] = useState('sans');
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedYear, setSelectedYear] = useState('All'); 
      
      const [showPodcastOnly, setShowPodcastOnly] = useState(false);
      const [visiblePostCount, setVisiblePostCount] = useState(12);
      
      const [user, setUser] = useState(null);
      const [posts, setPosts] = useState([]);
      const [loading, setLoading] = useState(true);
      const [authError, setAuthError] = useState('');

      useEffect(() => {
        const setupAuth = () => {
          return window.onAuthStateChanged(window.auth, (currentUser) => {
            setUser(currentUser);
            setLoading(false);
          });
        };

        if (window.firebaseInitialized) {
          return setupAuth();
        } else {
          let cleanup;
          const onReady = () => { cleanup = setupAuth(); };
          window.addEventListener('firebase-ready', onReady);
          return () => {
            window.removeEventListener('firebase-ready', onReady);
            if (cleanup) cleanup();
          };
        }
      }, []);

      const handleLogin = async () => {
        setAuthError('');

        const currentDomain = window.location.hostname;
        const isAuthorizedHost = 
          currentDomain === 'localhost' || 
          currentDomain === '127.0.0.1' ||
          currentDomain.endsWith('.web.app') || 
          currentDomain.endsWith('.firebaseapp.com');

        if (!isAuthorizedHost) {
          setAuthError('プレビュー環境ではログインできません。別タブで本番環境を開きました。');
          window.open('https://uds-minimal-log.web.app', '_blank');
          return; 
        }

        try {
          const provider = new window.GoogleAuthProvider();
          await window.signInWithPopup(window.auth, provider);
        } catch (error) {
          console.error("Login failed", error);
          setAuthError('ログインに失敗しました。ポップアップがブロックされている可能性があります。');
        }
      };

      const handleLogout = () => {
        window.signOut(window.auth);
        setPosts([]); 
      };

      useEffect(() => {
        if (!user) return; 

        const isAuthorizedDomain = user.email && (
          user.email.endsWith('@uds-net.co.jp') || 
          user.email.endsWith('@okinawa-uds.co.jp')
        );

        if (!isAuthorizedDomain) {
           setAuthError('UDSグループの社内アカウントでのみアクセス可能です。');
           window.signOut(window.auth); 
           return;
        }

        const fetchPosts = async () => {
          setLoading(true);
          try {
            const collectionPath = window.collection(window.db, "artifacts", window.APP_ID, "public", "data", "posts");
            const querySnapshot = await window.getDocs(collectionPath);
            const fetchedPosts = [];
            
            querySnapshot.forEach((doc) => {
              const data = doc.data();
              if (data.isVisible !== false && data.isVisible !== "false" && data.isVisible !== "FALSE") {
                const dateObj = new Date(data.date);
                const year = dateObj.getFullYear().toString();
                const m = dateObj.getMonth() + 1;
                const d = dateObj.getDate();
                const month = `${year}年${dateObj.getMonth() + 1}月`;
                const searchableDate = `${data.date} ${year}年${m}月${d}日 ${year}/${m}/${d} ${m}月${d}日`;
                fetchedPosts.push({ id: doc.id, year, month, displayDate: data.date, searchableDate, ...data });
              }
            });

            fetchedPosts.sort((a, b) => new Date(b.date) - new Date(a.date));
            setPosts(fetchedPosts);

            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');
            if (targetId) {
              const targetPost = fetchedPosts.find(p => String(p.id) === targetId);
              if (targetPost) {
                setSelectedPost(targetPost);
                setView('article');
              }
            }
            
            setAuthError('');
          } catch (error) {
            console.error("Firestore読み込みエラー:", error);
            if(error.message.includes('permission-denied')){
               setAuthError('データの読み取り権限がありません。');
            } else {
               setAuthError('データの取得に失敗しました。');
            }
          } finally {
            setLoading(false);
          }
        };

        fetchPosts();
      }, [user]);

      const themeStyles = {
        white: { 
          bg: 'bg-[#F8FAFC]', surface: 'bg-[#FFFFFF]', text: 'text-[#31363F]', muted: 'text-[#64748B]', 
          accent: 'text-[#76ABAE]', divider: 'border-[#E2E8F0]', btn: 'bg-[#FFFFFF] shadow-sm active:bg-[#F8FAFC]',
          chipActive: 'bg-[#76ABAE] text-[#FFFFFF] shadow-md', chipInactive: 'text-[#64748B] hover:text-[#31363F]',
          searchBg: 'bg-[#F8FAFC]', segmentedBg: 'bg-[#F8FAFC]', readingGreen: 'text-[#76ABAE]', 
          fadeEdge: 'from-[#F8FAFC] to-transparent', cardHover: 'hover:shadow-xl hover:-translate-y-0.5 border border-transparent hover:border-[#76ABAE]/30',
          iconBg: 'bg-[#76ABAE]/10'
        },
        dark: { 
          bg: 'bg-[#222831]', surface: 'bg-[#31363F]', text: 'text-[#EEEEEE]', muted: 'text-[#9CA3AF]', 
          accent: 'text-[#76ABAE]', divider: 'border-white/10', btn: 'bg-[#31363F] active:bg-[#222831]',
          chipActive: 'bg-[#76ABAE] text-[#FFFFFF] shadow-lg', chipInactive: 'text-[#9CA3AF] hover:text-[#EEEEEE]',
          searchBg: 'bg-[#31363F]', segmentedBg: 'bg-[#31363F]', readingGreen: 'text-[#76ABAE]',
          fadeEdge: 'from-[#222831] to-transparent', cardHover: 'hover:shadow-[0_20px_40px_rgba(0,0,0,0.4)] hover:-translate-y-0.5 border border-white/5 hover:border-[#76ABAE]/40',
          iconBg: 'bg-[#76ABAE]/20'
        }
      };

      const s = themeStyles[theme] || themeStyles.dark;
      
      const fontStack = fontFamily === 'serif' 
        ? "'BIZ UDPMincho', 'Hiragino Mincho ProN', 'Noto Serif JP', serif" 
        : "'Inter', 'BIZ UDPGothic', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Hiragino Sans', sans-serif";

      const h1Style = { fontFamily: fontStack, fontSize: '52px', fontWeight: '700', lineHeight: '1.25', marginTop: '34px', marginBottom: '34px', letterSpacing: '-0.015em' };
      const h2Style = { fontFamily: fontStack, fontSize: '39px', fontWeight: '700', lineHeight: '1.3', marginTop: '48px', marginBottom: '32px', letterSpacing: '-0.015em' };
      const bodyTextStyle = { fontFamily: fontStack, fontSize: '26px', fontWeight: '400', lineHeight: '1.75', marginBottom: '2rem' };

      const availableYears = useMemo(() => {
        const years = [...new Set(posts.map(p => p.year))];
        return years.sort((a, b) => b - a);
      }, [posts]);

      const filteredPosts = useMemo(() => {
        return posts.filter(post => {
          const query = searchQuery.toLowerCase();
          const matchesSearch = post.title.toLowerCase().includes(query) || 
                                (post.summary && post.summary.toLowerCase().includes(query)) ||
                                (post.content && post.content.toLowerCase().includes(query)) ||
                                (post.searchableDate && post.searchableDate.includes(query));
          const matchesYear = selectedYear === 'All' || post.year === selectedYear;
          const matchesPodcast = showPodcastOnly ? (post.hasAudio || post.audioUrl) : true;
          return matchesSearch && matchesYear && matchesPodcast;
        });
      }, [searchQuery, selectedYear, showPodcastOnly, posts]);

      const isSearchingOrFiltering = searchQuery.length > 0 || selectedYear !== 'All' || showPodcastOnly;
      
      // 💡 追加：検索・絞り込みの条件を人間が読みやすい形式に結合する処理
      const searchTitleParts = [];
      if (searchQuery) searchTitleParts.push(`"${searchQuery}"`);
      if (selectedYear !== 'All') searchTitleParts.push(`${selectedYear}年`);
      if (showPodcastOnly) searchTitleParts.push('Podcast');
      const searchTitle = searchTitleParts.join(' ＋ ');

      const latestPost = filteredPosts[0];
      const archivePosts = filteredPosts.slice(1);

      const calculateReadingTime = (post) => {
        if (!post) return 1;
        const charCount = (post.content?.length || 0) + (post.summary?.length || 0);
        return Math.ceil(charCount / 500) || 1;
      };

      // 💡 追加：音声の再生時間（例：17:45）を「〇 分」に丸めて表記揺れをなくす関数
      const formatDurationToMinutes = (durationStr) => {
        if (!durationStr) return "音声あり";
        if (durationStr.includes(':')) {
          const parts = durationStr.split(':');
          if (parts.length === 2) {
            // MM:SS の場合
            const min = parseInt(parts[0], 10) || 0;
            const sec = parseInt(parts[1], 10) || 0;
            const rounded = sec >= 30 ? min + 1 : min;
            return rounded === 0 ? "1 分" : `${rounded} 分`;
          } else if (parts.length === 3) {
            // HH:MM:SS の場合
            const hr = parseInt(parts[0], 10) || 0;
            const min = parseInt(parts[1], 10) || 0;
            return `${hr * 60 + min} 分`;
          }
        }
        // 数字のみ入力されている場合 "17" -> "17 分"
        const num = parseInt(durationStr, 10);
        if (!isNaN(num)) return `${num} 分`;
        return durationStr;
      };

      const handleOpenArticle = (post) => {
        setSelectedPost(post);
        setView('article');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const isGoogleDriveUrl = (url) => url && url.includes('drive.google.com');

      const getDriveIframeUrl = (url) => {
        if (!url) return "";
        const match = url.match(/\/file\/d\/([^\/]+)/);
        if (match && match[1]) {
          return `https://drive.google.com/file/d/${match[1]}/preview`;
        }
        return url;
      };

      const handleBackToList = () => {
        setView('index'); 
        setSearchQuery(''); 
        setSelectedYear('All'); 
        
        if (window.history.replaceState) {
          const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
          window.history.replaceState({path: cleanUrl}, '', cleanUrl);
        }
      };

      const renderTextWithLinksAndBold = (line) => {
        const linkParts = line.split(/(\[.*?\]\(.*?\))/g);
        return linkParts.map((part, i) => {
          const match = part.match(/\[(.*?)\]\((.*?)\)/);
          if (match) {
            return <a key={`link-${i}`} href={match[2]} target="_blank" rel="noopener noreferrer" className="text-[#76ABAE] font-bold hover:underline">{match[1]}</a>;
          }
          const boldParts = part.split(/(\*\*.*?\*\*)/g);
          return boldParts.map((bp, j) => {
            const bMatch = bp.match(/\*\*(.*?)\*\*/);
            if (bMatch) return <strong key={`bold-${i}-${j}`} className="font-bold">{bMatch[1]}</strong>;
            return bp;
          });
        });
      };

      const renderParsedContent = (text) => {
        if (!text) return null;
        const lines = text.split('\n');
        let result = [];
        let currentParagraph = [];
        let currentList = [];
        let currentListType = null; 

        const flushParagraph = (index) => {
          if (currentParagraph.length > 0) {
            result.push(<p key={`p-${index}`} style={bodyTextStyle}>{renderTextWithLinksAndBold(currentParagraph.join(' '))}</p>);
            currentParagraph = [];
          }
        };

        const flushList = (index) => {
          if (currentList.length > 0) {
            if (currentListType === 'ol') {
                result.push(
                  <ol key={`ol-${index}`} className="list-decimal list-outside ml-10 mb-10 space-y-3 opacity-90" style={{ fontFamily: fontStack, fontSize: '26px', lineHeight: '1.75' }}>
                    {currentList.map((item, i) => (
                      <li key={`li-${index}-${i}`} className="pl-2 leading-relaxed">{renderTextWithLinksAndBold(item)}</li>
                    ))}
                  </ol>
                );
            } else {
                result.push(
                  <ul key={`ul-${index}`} className="list-disc list-outside ml-10 mb-10 space-y-3 opacity-90" style={{ fontFamily: fontStack, fontSize: '26px', lineHeight: '1.75' }}>
                    {currentList.map((item, i) => (
                      <li key={`li-${index}-${i}`} className="pl-1 leading-relaxed">{renderTextWithLinksAndBold(item)}</li>
                    ))}
                  </ul>
                );
            }
            currentList = [];
            currentListType = null;
          }
        };

        lines.forEach((line, index) => {
          const trimmedLine = line.trim();
          const ulMatch = trimmedLine.match(/^[-*]\s+(.*)/);
          const olMatch = trimmedLine.match(/^\d+\.\s+(.*)/);
          
          if (trimmedLine.startsWith('## ')) {
            flushList(index);
            flushParagraph(index);
            result.push(<h2 key={`h2-${index}`} style={h2Style}>{trimmedLine.replace('## ', '')}</h2>);
          } else if (trimmedLine.startsWith('### ')) {
            flushList(index);
            flushParagraph(index);
            const h3Style = { fontFamily: fontStack, fontSize: '32px', fontWeight: '700', lineHeight: '1.3', marginTop: '40px', marginBottom: '24px', letterSpacing: '-0.015em' };
            result.push(<h3 key={`h3-${index}`} style={h3Style}>{trimmedLine.replace('### ', '')}</h3>);
          } else if (ulMatch) {
            flushParagraph(index);
            if (currentListType === 'ol') flushList(index);
            currentListType = 'ul';
            currentList.push(ulMatch[1]);
          } else if (olMatch) {
            flushParagraph(index);
            if (currentListType === 'ul') flushList(index); 
            currentListType = 'ol';
            currentList.push(olMatch[1]);
          } else if (trimmedLine === '') {
            flushList(index);
            flushParagraph(index);
          } else {
            flushList(index);
            currentParagraph.push(line);
          }
        });
        
        flushList('last');
        flushParagraph('last');
        
        return result;
      };

      const MetaRow = ({ post, className = "" }) => (
        <div className={`flex items-center gap-2 text-[16px] font-semibold ${className}`}>
          <span className={s.muted}>{post.displayDate}</span>
          <span className={`${s.muted} opacity-40 font-normal`}>•</span>
          <span className={s.readingGreen}>
            {/* 💡 変更：フォーマット関数を通して「〇 分」の表記に統一 */}
            {(post.hasAudio || post.audioUrl) && post.duration 
              ? `リスニング ${formatDurationToMinutes(post.duration)}` 
              : `読了目安 ${calculateReadingTime(post)} 分`}
          </span>
        </div>
      );

      if (loading) {
        return (
          <div className={`min-h-screen ${s.bg} flex items-center justify-center`}>
            <div className={`animate-pulse text-lg font-bold ${s.text} opacity-50`}>システムを読み込み中...</div>
          </div>
        );
      }

      if (!user) {
        return (
          <div className={`min-h-screen ${s.bg} flex flex-col items-center justify-center p-6`} style={{ fontFamily: fontStack }}>
            <div className={`${s.surface} p-12 rounded-[2rem] max-w-md w-full shadow-2xl text-center space-y-8 border ${s.divider}`}>
              <div className={`w-16 h-16 mx-auto ${s.iconBg} rounded-2xl flex items-center justify-center`}>
                <svg className={`w-8 h-8 ${s.accent}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
              </div>
              <div>
                <h1 className={`text-2xl font-bold ${s.text} mb-2`}>IT MAIL ARCHIVES</h1>
                <p className={`${s.muted} text-sm`}>このポータルは社外秘です。<br/>UDSグループの社内アカウントでのログインが必要です。</p>
              </div>
              
              {authError && (
                <div className="bg-red-500/10 text-red-500 text-sm p-4 rounded-xl font-medium">
                  {authError}
                </div>
              )}

              <button 
                onClick={handleLogin}
                className="w-full bg-[#76ABAE] hover:brightness-110 text-white font-bold py-4 px-6 rounded-xl transition-all flex items-center justify-center gap-3 shadow-lg"
              >
                <svg className="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Googleでログイン
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className={`min-h-screen ${s.bg} ${s.text} transition-colors duration-500 antialiased`} style={{ fontFamily: fontStack }}>
          <nav className={`sticky top-0 z-50 ${s.bg}/70 backdrop-blur-2xl border-b ${s.divider} px-6 py-4`}>
            <div className="max-w-[1000px] mx-auto flex justify-between items-center">
              <div className="flex items-center gap-4">
                <button onClick={handleBackToList} className={`p-2 rounded-full transition-all ${view === 'index' && !isSearchingOrFiltering ? 'opacity-0 scale-90 pointer-events-none' : 'opacity-100 scale-100 hover:bg-current/10'}`} disabled={view === 'index' && !isSearchingOrFiltering}><ArrowLeft size={20} /></button>
                <span className="text-[15px] font-bold tracking-tight">{SITE_TITLE}</span>
              </div>
              
              <div className="flex items-center gap-1 bg-current/5 p-1 rounded-xl">
                <button onClick={() => setFontFamily(fontFamily === 'sans' ? 'serif' : 'sans')} className={`p-2 rounded-lg hover:bg-current/10 transition-colors`} title="フォントの切り替え"><Type size={18} /></button>
                <div className={`w-[1px] h-4 mx-1 ${s.divider} border-l`} />
                <button onClick={handleLogout} title="ログアウト" className={`p-2 rounded-lg hover:bg-red-500/10 hover:text-red-500 transition-colors`}><LogOut size={18}/></button>
              </div>
            </div>
          </nav>

          <main className={`max-w-[1000px] mx-auto px-6 py-12`}>
            {view === 'index' ? (
              <div className="space-y-16">
                <div className="space-y-8">
                  <div className="relative group w-full">
                    <Search className={`absolute left-6 top-1/2 -translate-y-1/2 opacity-30 group-focus-within:opacity-100 group-focus-within:${s.accent} transition-opacity`} size={24} />
                    <input 
                      type="text"
                      placeholder="キーワードでアーカイブを検索"
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      className={`w-full pl-16 pr-14 py-5 rounded-full ${s.searchBg} border-none outline-none transition-all text-xl font-medium shadow-sm focus:ring-4 focus:ring-[#76ABAE]/30 placeholder:text-current/25`}
                    />
                    {searchQuery.length > 0 && (
                      <button onClick={() => setSearchQuery('')} className="absolute right-6 top-1/2 -translate-y-1/2 opacity-40 hover:opacity-100 transition-opacity">
                        <X size={24} />
                      </button>
                    )}
                  </div>
                  
                  <div className="flex flex-col md:flex-row gap-6 md:gap-10">
                    <div className="space-y-3">
                      <div className="flex items-center gap-2 px-1 text-[13px] font-bold opacity-40 uppercase tracking-widest">
                        <Filter size={14} />
                        <span>Year Archive</span>
                      </div>
                      <div className="relative w-full overflow-hidden">
                        <div className={`flex p-1.5 rounded-full ${s.segmentedBg} overflow-x-auto hide-scrollbar scroll-smooth`}>
                          <button onClick={() => setSelectedYear('All')} className={`px-8 py-2.5 rounded-full text-[14px] font-bold transition-all whitespace-nowrap z-10 ${selectedYear === 'All' ? s.chipActive : s.chipInactive}`}>すべて</button>
                          {availableYears.map(year => (
                            <button key={year} onClick={() => setSelectedYear(year)} className={`px-8 py-2.5 rounded-full text-[14px] font-bold transition-all whitespace-nowrap z-10 ${selectedYear === year ? s.chipActive : s.chipInactive}`}>{year}年</button>
                          ))}
                        </div>
                        <div className={`absolute right-0 top-0 bottom-0 w-16 bg-gradient-to-l ${s.fadeEdge} pointer-events-none z-20`}></div>
                      </div>
                    </div>

                    <div className="space-y-3">
                      <div className="flex items-center gap-2 px-1 text-[13px] font-bold opacity-40 uppercase tracking-widest">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>
                        <span>Format</span>
                      </div>
                      <div className={`flex p-1.5 rounded-full ${s.segmentedBg} overflow-x-auto hide-scrollbar w-fit`}>
                        <button onClick={() => setShowPodcastOnly(false)} className={`px-6 py-2.5 rounded-full text-[14px] font-bold transition-all whitespace-nowrap z-10 ${!showPodcastOnly ? s.chipActive : s.chipInactive}`}>すべて</button>
                        <button onClick={() => setShowPodcastOnly(true)} className={`px-6 py-2.5 rounded-full text-[14px] font-bold transition-all whitespace-nowrap z-10 flex items-center gap-2 ${showPodcastOnly ? 'bg-[#F43F5E] text-white shadow-md' : s.chipInactive}`}>
                          Podcast
                        </button>
                      </div>
                    </div>
                  </div>
                </div>

                {isSearchingOrFiltering ? (
                  <div className="animate-in fade-in duration-500">
                    {/* 💡 変更：先ほど作成したスマートな見出し（searchTitle）を表示 */}
                    <div className={`text-3xl font-bold tracking-tight mb-12`}>{searchTitle} の検索結果</div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      {filteredPosts.map(post => (
                        <article key={post.id} className={`${s.surface} p-8 rounded-[2rem] flex flex-col cursor-pointer transition-all duration-300 ${s.cardHover} group`} onClick={() => handleOpenArticle(post)}>
                            <div className="flex items-center justify-between mb-5">
                                <span className={`text-[11px] font-black uppercase tracking-widest px-3 py-1 rounded-md ${post.hasAudio || post.audioUrl ? (theme === 'dark' ? 'bg-[#F43F5E]/20 text-[#FB7185]' : 'bg-[#E11D48]/10 text-[#E11D48]') : `${s.iconBg} ${s.accent}`}`}>
                                    {post.hasAudio || post.audioUrl ? "Podcast" : "Article"}
                                </span>
                                <div className="flex items-center gap-3">
                                    <span className={`text-[12px] font-bold ${s.readingGreen} flex items-center gap-1`}>
                                        <Clock size={12} /> 
                                        {/* 💡 変更：カードの表記も「〇 分」に統一 */}
                                        {(post.hasAudio || post.audioUrl) ? formatDurationToMinutes(post.duration) : `${calculateReadingTime(post)} 分`}
                                    </span>
                                    <span className={`text-[13px] font-semibold ${s.muted}`}>{post.displayDate}</span>
                                </div>
                            </div>
                            <h4 className={`text-[1.35rem] font-bold leading-[1.4] tracking-tight mb-4 transition-colors flex-1 group-hover:${s.accent}`}>{post.title}</h4>
                            <p className={`text-[14px] ${s.muted} leading-relaxed line-clamp-3 font-medium`}>{post.summary}</p>
                        </article>
                      ))}
                      {filteredPosts.length === 0 && (
                        <div className="py-24 text-center opacity-40 col-span-1 md:col-span-2">
                          <Search size={64} className="mx-auto mb-6" />
                          <p className="text-2xl font-medium tracking-tight">該当する記事は見つかりませんでした</p>
                        </div>
                      )}
                    </div>
                  </div>
                ) : (
                  <div className="space-y-24 animate-in fade-in duration-700">
                    {posts.length === 0 && (
                      <div className="text-center opacity-40 py-20 font-bold text-xl">
                        データベースに記事がありません。GASから取り込みを実行してください。
                      </div>
                    )}
                    
                    {latestPost && (
                      <section className="space-y-6">
                        <div className={`text-[13px] font-bold uppercase tracking-[0.1em] ${s.muted} px-4`}>Latest Weekly Insight</div>
                        
                        <div className={`${s.surface} rounded-[2.75rem] p-10 md:p-14 shadow-2xl shadow-black/5 transition-all duration-300 border border-transparent hover:border-[#76ABAE]/20`}>
                          
                          <div className="flex flex-col gap-8 cursor-pointer group" onClick={() => handleOpenArticle(latestPost)}>
                            <div className="flex flex-wrap items-center gap-4">
                                <span className={`text-[12px] font-black uppercase tracking-widest px-3.5 py-1.5 rounded-md ${latestPost.hasAudio || latestPost.audioUrl ? (theme === 'dark' ? 'bg-[#F43F5E]/20 text-[#FB7185]' : 'bg-[#E11D48]/10 text-[#E11D48]') : `${s.iconBg} ${s.accent}`}`}>
                                    {latestPost.hasAudio || latestPost.audioUrl ? "Podcast" : "Article"}
                                </span>
                                <MetaRow post={latestPost} />
                            </div>
                            <h2 className={`text-[2.5rem] md:text-[3.25rem] font-bold leading-[1.1] tracking-tighter ${s.text} max-w-4xl group-hover:${s.accent} transition-colors`}>{latestPost.title}</h2>
                            <p className={`text-[1.25rem] md:text-[1.4rem] leading-[1.6] ${s.muted} line-clamp-3 font-medium`}>{latestPost.summary}</p>
                          </div>

                          {(latestPost.audioUrl || latestPost.hasAudio) && (
                              <div className="mt-10 pt-8 border-t border-white/10">
                                  <div className={`flex items-center gap-3 ${s.accent} font-bold text-[16px] mb-4`}>
                                      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>
                                      <span>Play Latest Podcast</span>
                                  </div>
                                  {latestPost.audioUrl ? (
                                      isGoogleDriveUrl(latestPost.audioUrl) ? (
                                          <div className="w-full h-[140px] rounded-xl overflow-hidden relative border border-white/10 bg-black/20">
                                             <iframe src={getDriveIframeUrl(latestPost.audioUrl)} className="w-full h-full border-none" allow="autoplay"></iframe>
                                          </div>
                                      ) : (
                                          <audio controls src={latestPost.audioUrl} className="w-full outline-none" controlsList="nodownload" />
                                      )
                                  ) : (
                                      <div className={`p-4 rounded-xl bg-black/5 dark:bg-white/5 text-[14px] font-bold ${s.muted}`}>
                                          ※ 音声ファイルがアップロードされていません
                                      </div>
                                  )}
                              </div>
                          )}
                        </div>
                      </section>
                    )}
                    
                    {archivePosts.length > 0 && (
                      <section className="space-y-6 pt-4">
                        <div className={`text-[13px] font-bold uppercase tracking-[0.1em] ${s.muted} px-4`}>Previous Archives</div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                          {archivePosts.slice(0, visiblePostCount).map(post => (
                            <article key={post.id} className={`${s.surface} p-8 rounded-[2rem] flex flex-col cursor-pointer transition-all duration-300 ${s.cardHover} group`} onClick={() => handleOpenArticle(post)}>
                                <div className="flex items-center justify-between mb-5">
                                    <span className={`text-[11px] font-black uppercase tracking-widest px-3 py-1 rounded-md ${post.hasAudio || post.audioUrl ? (theme === 'dark' ? 'bg-[#F43F5E]/20 text-[#FB7185]' : 'bg-[#E11D48]/10 text-[#E11D48]') : `${s.iconBg} ${s.accent}`}`}>
                                        {post.hasAudio || post.audioUrl ? "Podcast" : "Article"}
                                    </span>
                                    <div className="flex items-center gap-3">
                                        <span className={`text-[12px] font-bold ${s.readingGreen} flex items-center gap-1`}>
                                            <Clock size={12} /> 
                                            {/* 💡 変更：過去アーカイブのカード表記も「〇 分」に統一 */}
                                            {(post.hasAudio || post.audioUrl) ? formatDurationToMinutes(post.duration) : `${calculateReadingTime(post)} 分`}
                                        </span>
                                        <span className={`text-[13px] font-semibold ${s.muted}`}>{post.displayDate}</span>
                                    </div>
                                </div>
                                <h4 className={`text-[1.35rem] font-bold leading-[1.4] tracking-tight mb-4 transition-colors flex-1 group-hover:${s.accent}`}>{post.title}</h4>
                                <p className={`text-[14px] ${s.muted} leading-relaxed line-clamp-3 font-medium`}>{post.summary}</p>
                            </article>
                          ))}
                        </div>

                        {visiblePostCount < archivePosts.length && (
                          <div className="text-center pt-12">
                            <button onClick={() => setVisiblePostCount(prev => prev + 12)} className={`px-10 py-4 rounded-full ${s.surface} text-[15px] font-bold tracking-tight hover:brightness-110 active:scale-95 transition-all shadow-sm border ${s.divider}`}>
                                もっと過去の記録を読み込む
                            </button>
                          </div>
                        )}
                      </section>
                    )}
                  </div>
                )}
              </div>
            ) : (
              <div className="animate-in fade-in duration-700 pb-32 max-w-[800px] mx-auto">
                <header className="mb-20">
                  <div className="flex items-center gap-3 mb-6 text-[16px] font-semibold">
                    <span className={s.muted}>{selectedPost.displayDate}</span>
                    <span className={`${s.muted} opacity-40 font-normal`}>•</span>
                    <div className={`flex items-center gap-1.5 ${s.readingGreen}`}>
                      <Clock size={18} />
                      <span>
                        {/* 💡 変更：詳細画面ヘッダーも「〇 分」に統一 */}
                        {(selectedPost.hasAudio || selectedPost.audioUrl) && selectedPost.duration 
                          ? `リスニング ${formatDurationToMinutes(selectedPost.duration)}`
                          : `読了目安 ${calculateReadingTime(selectedPost)} 分`}
                      </span>
                    </div>
                  </div>
                  <h1 style={h1Style} className={`${s.text} tracking-tighter`}>{selectedPost.title}</h1>
                </header>

                <div className="space-y-12">
                  <p style={bodyTextStyle} className="opacity-90 font-medium">{selectedPost.summary}</p>

                  {(selectedPost.audioUrl || selectedPost.hasAudio) && (
                    <div className={`p-8 rounded-[2rem] ${s.surface} shadow-sm border ${s.divider} flex flex-col gap-5 mt-12 mb-6`}>
                      <div className={`flex items-center gap-3 ${s.accent} font-bold text-lg`}>
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>
                        <span>Podcast Archive</span>
                      </div>
                      
                      {selectedPost.audioUrl ? (
                        isGoogleDriveUrl(selectedPost.audioUrl) ? (
                          <div className="w-full mt-2 h-[140px] rounded-xl overflow-hidden relative border border-white/10 bg-black/20">
                             <iframe src={getDriveIframeUrl(selectedPost.audioUrl)} className="w-full h-full border-none" allow="autoplay"></iframe>
                          </div>
                        ) : (
                          <audio controls src={selectedPost.audioUrl} className="w-full mt-1 outline-none" controlsList="nodownload" />
                        )
                      ) : (
                        <div className={`p-4 rounded-xl bg-black/5 dark:bg-white/5 text-[14px] font-bold ${s.muted}`}>
                          ※ この記事の音声ファイル（audioUrl）はまだアップロードされていません
                        </div>
                      )}
                    </div>
                  )}

                  <div className={`p-8 rounded-[2rem] ${s.surface} flex items-center gap-6 shadow-sm border ${s.divider} mb-16`}>
                    <div className={`p-4 ${s.iconBg} rounded-[1.25rem] shrink-0`}>
                      <Info className={s.accent} size={28} />
                    </div>
                    <p className="text-[1.25rem] leading-relaxed font-semibold">
                      この記事は、<strong>{selectedPost.displayDate}</strong> に配信された社内メールの内容を、一部構成し直して掲載しています。
                    </p>
                  </div>

                  <div className={`h-[1px] w-full ${s.divider} border-t mb-16`}></div>
                  
                  <article className="article-content">
                    {renderParsedContent(selectedPost.content)}
                  </article>
                </div>

                <footer className={`mt-48 pt-12 border-t ${s.divider} flex justify-center opacity-20 text-[11px] font-black uppercase tracking-[0.4em]`}>
                  End of Message
                </footer>
              </div>
            )}
          </main>

          <footer className="py-24 text-center opacity-10">
            <div className="w-1.5 h-1.5 mx-auto bg-current rounded-full"></div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
